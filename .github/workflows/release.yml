name: Release

# release-please opens/maintains a release PR from conventional commits. Merging
# it bumps the version, updates the changelog, and creates the GitHub release and
# tag - which then gates the binary build below (same run, so no token gotcha).
# Requires @voidberg/quarto to be published to JSR first.
on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create release PR or GitHub release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check
        run: deno check main.ts

      - name: Compile (${{ matrix.target }})
        run: |
          deno compile \
            --allow-env --allow-read --allow-write --allow-net \
            --include src/assets \
            --target ${{ matrix.target }} \
            --output "instakobo-${{ matrix.target }}" \
            main.ts

      - name: Package
        run: tar -czf "instakobo-${{ matrix.target }}.tar.gz" "instakobo-${{ matrix.target }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: instakobo-${{ matrix.target }}.tar.gz

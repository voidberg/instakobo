name: Release

# Build self-contained binaries for each platform when a version tag is pushed.
# Requires @voidberg/quarto to be published to JSR first.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check
        run: deno check main.ts

      - name: Compile (${{ matrix.target }})
        run: |
          deno compile \
            --allow-env --allow-read --allow-write --allow-net \
            --target ${{ matrix.target }} \
            --output "instakobo-${{ matrix.target }}" \
            main.ts

      - name: Package
        run: tar -czf "instakobo-${{ matrix.target }}.tar.gz" "instakobo-${{ matrix.target }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: instakobo-${{ matrix.target }}.tar.gz
